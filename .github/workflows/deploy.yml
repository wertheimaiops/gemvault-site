name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Copy GemVault screenshots into build
        run: |
          if [ -d "gemvault-screenshots" ]; then
            cp -r gemvault-screenshots/. dist/gemvault/screenshots/
            echo "Screenshots copied from gemvault-screenshots/"
          else
            echo "No gemvault-screenshots/ folder found — skipping"
          fi

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          cname: wertops.com
